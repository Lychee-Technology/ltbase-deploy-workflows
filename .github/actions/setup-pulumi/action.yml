name: Setup Pulumi
description: Install Go and Pulumi, log into the backend, and select a stack

inputs:
  go-version-file:
    description: Go version file path
    required: false
    default: infra/go.mod
  cache-dependency-path:
    description: Go cache dependency path
    required: false
    default: infra/go.sum
  pulumi-backend-url:
    description: Pulumi backend URL
    required: true
  pulumi-stack:
    description: Stack name
    required: true
  pulumi-secrets-provider:
    description: Pulumi secrets provider URL
    required: true
  working-directory:
    description: Pulumi project directory
    required: false
    default: infra

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version-file: ${{ inputs.go-version-file }}
        cache: true
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
    - uses: pulumi/actions@v6
    - name: Pulumi login
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        "${{ github.action_path }}/setup.sh" \
          --pulumi-backend-url "${{ inputs.pulumi-backend-url }}" \
          --pulumi-stack "${{ inputs.pulumi-stack }}" \
          --pulumi-secrets-provider "${{ inputs.pulumi-secrets-provider }}" \
          --working-directory "${{ inputs.working-directory }}"
