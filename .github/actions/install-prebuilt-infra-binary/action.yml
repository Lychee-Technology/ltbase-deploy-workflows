name: Install Prebuilt Infra Binary
description: Install an upstream-template-bound prebuilt Pulumi infra binary from blueprint provenance when available

inputs:
  binaries-repo:
    description: Repository holding published prebuilt infra binary releases
    required: true
  provenance-path:
    description: Path to the checked-in template provenance file inside the checked-out blueprint
    required: true
  working-directory:
    description: Pulumi project directory under the checked-out blueprint
    required: true
  token:
    description: GitHub token with actions read access to the blueprint repository
    required: true

outputs:
  installed:
    description: Whether a matching prebuilt binary was installed
    value: ${{ steps.install.outputs.installed }}

runs:
  using: composite
  steps:
    - id: install
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        "${{ github.action_path }}/install.sh" \
          --binaries-repo "${{ inputs.binaries-repo }}" \
          --provenance-path "${{ inputs.provenance-path }}" \
          --working-directory "${{ inputs.working-directory }}"
