name: Promote Prod

on:
  workflow_call:
    inputs:
      blueprint_ref:
        type: string
        required: false
      pulumi_stack:
        type: string
        required: false
        default: prod
      aws_region:
        type: string
        required: false
        default: ap-northeast-1
      release_id:
        type: string
        required: true
      pulumi_backend_url:
        type: string
        required: true
      pulumi_secrets_provider:
        type: string
        required: true
      releases_repo:
        type: string
        required: false
        default: Lychee-Technology/ltbase-releases
      working_directory:
        type: string
        required: false
        default: infra
    secrets:
      aws_role_arn:
        required: true
      ltbase_releases_token:
        required: true
      cloudflare_api_token:
        required: true
    outputs:
      release_id:
        value: ${{ jobs.promote.outputs.release_id }}
      manifest_path:
        value: ${{ jobs.promote.outputs.manifest_path }}
      pulumi_stack:
        value: ${{ jobs.promote.outputs.pulumi_stack }}
      deployment_outputs_json:
        value: ${{ jobs.promote.outputs.deployment_outputs_json }}

permissions:
  contents: read
  id-token: write

jobs:
  promote:
    uses: Lychee-Technology/ltbase-deploy-workflows/.github/workflows/rollout-hop.yml@main
    with:
      blueprint_ref: ${{ inputs.blueprint_ref }}
      pulumi_stack: ${{ inputs.pulumi_stack }}
      aws_region: ${{ inputs.aws_region }}
      release_id: ${{ inputs.release_id }}
      pulumi_backend_url: ${{ inputs.pulumi_backend_url }}
      pulumi_secrets_provider: ${{ inputs.pulumi_secrets_provider }}
      releases_repo: ${{ inputs.releases_repo }}
      working_directory: ${{ inputs.working_directory }}
      run_canary: true
      refresh_after_apply: true
    secrets:
      aws_role_arn: ${{ secrets.aws_role_arn }}
      ltbase_releases_token: ${{ secrets.ltbase_releases_token }}
      cloudflare_api_token: ${{ secrets.cloudflare_api_token }}
