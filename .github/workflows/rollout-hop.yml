name: Rollout Hop

on:
  workflow_call:
    inputs:
      blueprint_ref:
        type: string
        required: false
      pulumi_stack:
        type: string
        required: true
      aws_region:
        type: string
        required: true
      release_id:
        type: string
        required: true
      pulumi_backend_url:
        type: string
        required: true
      pulumi_secrets_provider:
        type: string
        required: true
      releases_repo:
        type: string
        required: false
        default: Lychee-Technology/ltbase-releases
      working_directory:
        type: string
        required: false
        default: infra
      workflow_actions_ref:
        type: string
        required: false
        default: main
      run_canary:
        type: boolean
        required: false
        default: false
      refresh_after_apply:
        type: boolean
        required: false
        default: false
      reconcile_managed_dsql_endpoint:
        type: boolean
        required: false
        default: false
        description: >
          When true, reads dsqlClusterIdentifier from the stack output,
          calls aws dsql get-cluster to fetch the authoritative endpoint,
          and writes it back as pulumi config dsqlEndpoint before output
          capture and any CodeDeploy canary steps.
    secrets:
      aws_role_arn:
        required: true
      ltbase_releases_token:
        required: true
      cloudflare_api_token:
        required: true
    outputs:
      release_id:
        value: ${{ jobs.rollout.outputs.release_id }}
      manifest_path:
        value: ${{ jobs.rollout.outputs.manifest_path }}
      pulumi_stack:
        value: ${{ jobs.rollout.outputs.pulumi_stack }}
      deployment_outputs_json:
        value: ${{ jobs.rollout.outputs.deployment_outputs_json }}

permissions:
  contents: read
  id-token: write

jobs:
  rollout:
    runs-on: ubuntu-24.04
    outputs:
      release_id: ${{ steps.meta.outputs.release_id }}
      manifest_path: ${{ steps.download.outputs.manifest_path }}
      pulumi_stack: ${{ steps.meta.outputs.pulumi_stack }}
      deployment_outputs_json: ${{ steps.outputs.outputs.deployment_outputs_json }}
    steps:
      - id: meta
        run: |
          echo "release_id=${{ inputs.release_id }}" >> "$GITHUB_OUTPUT"
          echo "pulumi_stack=${{ inputs.pulumi_stack }}" >> "$GITHUB_OUTPUT"
          echo "workflow_ref_name=${{ inputs.workflow_actions_ref }}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
        with:
          path: blueprint
          ref: ${{ inputs.blueprint_ref || github.sha }}
      - uses: actions/checkout@v6
        with:
          repository: Lychee-Technology/ltbase-deploy-workflows
          ref: ${{ steps.meta.outputs.workflow_ref_name }}
          path: .ltbase/workflow-repo
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
      - id: download
        uses: ./.ltbase/workflow-repo/.github/actions/download-private-release
        with:
          releases-repo: ${{ inputs.releases_repo }}
          release-id: ${{ inputs.release_id }}
          token: ${{ secrets.ltbase_releases_token }}
          output-root: blueprint/.ltbase/releases
      - uses: ./.ltbase/workflow-repo/.github/actions/setup-pulumi
        with:
          pulumi-backend-url: ${{ inputs.pulumi_backend_url }}
          pulumi-stack: ${{ inputs.pulumi_stack }}
          pulumi-secrets-provider: ${{ inputs.pulumi_secrets_provider }}
          working-directory: blueprint/${{ inputs.working_directory }}
      - name: Set release id
        working-directory: blueprint/${{ inputs.working_directory }}
        run: pulumi config set releaseId "${{ inputs.release_id }}" --stack "${{ inputs.pulumi_stack }}"
      - name: Deploy stack
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.cloudflare_api_token }}
        working-directory: blueprint/${{ inputs.working_directory }}
        run: pulumi up --stack "${{ inputs.pulumi_stack }}" --yes --non-interactive
      - name: Reconcile managed DSQL endpoint
        if: ${{ inputs.reconcile_managed_dsql_endpoint }}
        uses: ./.ltbase/workflow-repo/.github/actions/reconcile-managed-dsql-endpoint
        with:
          stack: ${{ inputs.pulumi_stack }}
          aws-region: ${{ inputs.aws_region }}
          working-directory: blueprint/${{ inputs.working_directory }}
      - name: Capture deployment outputs
        working-directory: blueprint/${{ inputs.working_directory }}
        run: pulumi stack output --json --stack "${{ inputs.pulumi_stack }}" > /tmp/deployment-outputs.json
      - name: Run data plane canary
        if: ${{ inputs.run_canary }}
        uses: ./.ltbase/workflow-repo/.github/actions/run-codedeploy-canary
        with:
          outputs-json: /tmp/deployment-outputs.json
          current-key: dataPlaneCurrentVersion
          target-key: dataPlaneTargetVersion
          function-key: dataPlaneFunctionName
          alias-key: dataPlaneAliasName
          app-key: dataPlaneDeploymentAppName
          group-key: dataPlaneDeploymentGroupName
      - name: Run control plane canary
        if: ${{ inputs.run_canary }}
        uses: ./.ltbase/workflow-repo/.github/actions/run-codedeploy-canary
        with:
          outputs-json: /tmp/deployment-outputs.json
          current-key: controlPlaneCurrentVersion
          target-key: controlPlaneTargetVersion
          function-key: controlPlaneFunctionName
          alias-key: controlPlaneAliasName
          app-key: controlPlaneDeploymentAppName
          group-key: controlPlaneDeploymentGroupName
      - name: Run auth service canary
        if: ${{ inputs.run_canary }}
        uses: ./.ltbase/workflow-repo/.github/actions/run-codedeploy-canary
        with:
          outputs-json: /tmp/deployment-outputs.json
          current-key: authServiceCurrentVersion
          target-key: authServiceTargetVersion
          function-key: authServiceFunctionName
          alias-key: authServiceAliasName
          app-key: authServiceDeploymentAppName
          group-key: authServiceDeploymentGroupName
      - name: Refresh stack
        if: ${{ inputs.refresh_after_apply }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.cloudflare_api_token }}
        working-directory: blueprint/${{ inputs.working_directory }}
        run: pulumi refresh --stack "${{ inputs.pulumi_stack }}" --yes --non-interactive
      - id: outputs
        run: |
          echo "deployment_outputs_json=$(jq -c '.' /tmp/deployment-outputs.json)" >> "$GITHUB_OUTPUT"
