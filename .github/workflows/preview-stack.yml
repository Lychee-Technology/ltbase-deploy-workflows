name: Preview Stack

on:
  workflow_call:
    inputs:
      blueprint_ref:
        type: string
        required: false
      pulumi_stack:
        type: string
        required: true
      aws_region:
        type: string
        required: true
      release_id:
        type: string
        required: true
      pulumi_backend_url:
        type: string
        required: true
      pulumi_secrets_provider:
        type: string
        required: true
      releases_repo:
        type: string
        required: false
        default: Lychee-Technology/ltbase-releases
      working_directory:
        type: string
        required: false
        default: infra
      infra_binaries_repo:
        type: string
        required: false
        default: Lychee-Technology/ltbase-private-deployment-binaries
      workflow_actions_ref:
        type: string
        required: false
        default: main
    secrets:
      aws_role_arn:
        required: true
      ltbase_releases_token:
        required: true
      cloudflare_api_token:
        required: true
    outputs:
      release_id:
        value: ${{ jobs.preview.outputs.release_id }}
      manifest_path:
        value: ${{ jobs.preview.outputs.manifest_path }}
      pulumi_stack:
        value: ${{ jobs.preview.outputs.pulumi_stack }}
      deployment_outputs_json:
        value: ${{ jobs.preview.outputs.deployment_outputs_json }}

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  preview:
    runs-on: ubuntu-24.04-arm
    outputs:
      release_id: ${{ steps.meta.outputs.release_id }}
      manifest_path: ${{ steps.download.outputs.manifest_path }}
      pulumi_stack: ${{ steps.meta.outputs.pulumi_stack }}
      deployment_outputs_json: ${{ steps.outputs.outputs.deployment_outputs_json }}
    steps:
      - id: meta
        run: |
          echo "release_id=${{ inputs.release_id }}" >> "$GITHUB_OUTPUT"
          echo "pulumi_stack=${{ inputs.pulumi_stack }}" >> "$GITHUB_OUTPUT"
          echo "workflow_ref_name=${{ inputs.workflow_actions_ref }}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
        with:
          path: blueprint
          ref: ${{ inputs.blueprint_ref || github.sha }}
      - uses: actions/checkout@v6
        with:
          repository: Lychee-Technology/ltbase-deploy-workflows
          ref: ${{ steps.meta.outputs.workflow_ref_name }}
          path: .ltbase/workflow-repo
      - name: Install prebuilt infra binary
        id: prebuilt
        uses: ./.ltbase/workflow-repo/.github/actions/install-prebuilt-infra-binary
        with:
          binaries-repo: ${{ inputs.infra_binaries_repo }}
          provenance-path: blueprint/__ref__/template-provenance.json
          working-directory: blueprint/${{ inputs.working_directory }}
          token: ${{ github.token }}
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
      - id: download
        uses: ./.ltbase/workflow-repo/.github/actions/download-private-release
        with:
          releases-repo: ${{ inputs.releases_repo }}
          release-id: ${{ inputs.release_id }}
          token: ${{ secrets.ltbase_releases_token }}
          output-root: blueprint/.ltbase/releases
      - uses: ./.ltbase/workflow-repo/.github/actions/setup-pulumi
        with:
          go-version-file: ${{ format('blueprint/{0}/go.mod', inputs.working_directory) }}
          cache-dependency-path: ${{ format('blueprint/{0}/go.sum', inputs.working_directory) }}
          pulumi-backend-url: ${{ inputs.pulumi_backend_url }}
          pulumi-stack: ${{ inputs.pulumi_stack }}
          pulumi-secrets-provider: ${{ inputs.pulumi_secrets_provider }}
          working-directory: blueprint/${{ inputs.working_directory }}
      - name: Set release id
        working-directory: blueprint/${{ inputs.working_directory }}
        run: |
          pulumi config set releaseAssetDir "$(pwd)/../.ltbase/releases" --stack "${{ inputs.pulumi_stack }}"
          pulumi config set releaseId "${{ inputs.release_id }}" --stack "${{ inputs.pulumi_stack }}"
      - name: Show Pulumi build environment
        working-directory: blueprint/${{ inputs.working_directory }}
        run: |
          date -u
          uname -a
          go version
          pulumi version
          go env GOMOD GOCACHE GOMODCACHE GOARCH GOOS
      - name: Preview
        uses: ./.ltbase/workflow-repo/.github/actions/run-pulumi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.cloudflare_api_token }}
          GOMAXPROCS: "2"
          GOMEMLIMIT: 3GiB
          GOGC: "50"
        with:
          working-directory: blueprint/${{ inputs.working_directory }}
          command: preview
          stack: ${{ inputs.pulumi_stack }}
          prefer-wrapper: true
          wrapper-path: scripts/pulumi-wrapper.sh
      - id: outputs
        run: |
          printf 'deployment_outputs_json=%s\n' '{}' >> "$GITHUB_OUTPUT"
